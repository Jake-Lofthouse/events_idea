name: Generate Events

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max events to generate for both HTML and images (0 = all)'
        required: false
        default: '0'
        type: string
      force_regenerate:
        description: 'Regenerate all images (ignore existing)'
        required: false
        default: false
        type: boolean

jobs:

  # ============================================================
  # JOB 1 — Generate HTML pages
  # ============================================================
  generate-html:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate HTML pages
        env:
          COURSE_MAPS_URL: ${{ secrets.COURSE_MAPS_URL }}
          EVENT_LIMIT: ${{ github.event.inputs.limit || '0' }}
        run: node scripts/generate-events.js

      - name: Upload HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: html-pages
          path: ./explore
          retention-days: 1

  # ============================================================
  # JOB 2 — Generate feature images
  # ============================================================
  generate-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install canvas sharp

      - name: Install canvas system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2-dev \
            libpango1.0-dev \
            libjpeg-dev \
            libgif-dev \
            librsvg2-dev

      - name: Clear existing images (force regenerate)
        if: ${{ github.event.inputs.force_regenerate == true || github.event.inputs.force_regenerate == 'true' }}
        run: |
          echo "Force regenerate enabled — clearing ./images"
          rm -rf ./images

      - name: Generate feature images
        env:
          COURSE_MAPS_URL: ${{ secrets.COURSE_MAPS_URL }}
          IMAGE_LIMIT: ${{ github.event.inputs.limit || '0' }}
        run: node scripts/generate-images.js

      - name: Upload images artifact
        uses: actions/upload-artifact@v4
        with:
          name: feature-images
          path: ./explore/images
          retention-days: 1

  # ============================================================
  # JOB 3 — Generate location pages (country / region / city)
  # ============================================================
  generate-locations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate location pages
        env:
          COURSE_MAPS_URL: ${{ secrets.COURSE_MAPS_URL }}
          EVENT_LIMIT: ${{ github.event.inputs.limit || '0' }}
        run: node scripts/generate-locations.js

      - name: Upload location pages artifact
        uses: actions/upload-artifact@v4
        with:
          name: location-pages
          path: ./locations
          retention-days: 1

      - name: Upload geo cache artifact
        uses: actions/upload-artifact@v4
        with:
          name: geo-cache
          path: ./geo-cache.json
          retention-days: 1
          if-no-files-found: ignore

  # ============================================================
  # JOB 4 — Commit everything together once all jobs finish
  # ============================================================
  commit:
    runs-on: ubuntu-latest
    needs: [generate-html, generate-images, generate-locations]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download HTML pages
        uses: actions/download-artifact@v4
        with:
          name: html-pages
          path: ./explore

      - name: Download feature images
        uses: actions/download-artifact@v4
        with:
          name: feature-images
          path: ./explore/images

      - name: Download location pages
        uses: actions/download-artifact@v4
        with:
          name: location-pages
          path: ./locations

      - name: Download geo cache
        uses: actions/download-artifact@v4
        with:
          name: geo-cache
          path: .
          # If no new coords were resolved this run the artifact may not exist — that is fine
        continue-on-error: true

      - name: Commit and push all output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ./explore ./locations
          # Commit geo-cache.json if present so future runs skip already-resolved coords
          [ -f ./geo-cache.json ] && git add ./geo-cache.json || true
          git diff --cached --quiet \
            && echo "Nothing to commit." \
            || git commit -m "chore: regenerate pages, images and location index [skip ci]" && git push
