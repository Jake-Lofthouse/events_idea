name: Generate Events

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max images to generate (0 = all)'
        required: false
        default: '0'
        type: string
      force_regenerate:
        description: 'Regenerate all images (ignore existing)'
        required: false
        default: false
        type: boolean

jobs:

  # ============================================================
  # JOB 1 — Generate HTML pages
  # ============================================================
  generate-html:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate HTML pages
        env:
          COURSE_MAPS_URL: ${{ secrets.COURSE_MAPS_URL }}
        run: node scripts/generate-events.js

      - name: Upload HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: html-pages
          path: ./explore
          retention-days: 1

  # ============================================================
  # JOB 2 — Generate feature images
  # ============================================================
  generate-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Install Puppeteer system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgbm-dev \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgtk-3-0 \
            libasound2t64 \
            libpangocairo-1.0-0 \
            libx11-xcb1

      - name: Clear existing images (force regenerate)
        if: ${{ github.event.inputs.force_regenerate == true || github.event.inputs.force_regenerate == 'true' }}
        run: |
          echo "Force regenerate enabled — clearing ./images"
          rm -rf ./images

      - name: Generate feature images
        env:
          COURSE_MAPS_URL: ${{ secrets.COURSE_MAPS_URL }}
          IMAGE_LIMIT: ${{ github.event.inputs.limit || '0' }}
        run: node scripts/generate-images.js

      - name: Upload images artifact
        uses: actions/upload-artifact@v4
        with:
          name: feature-images
          path: ./explore/images
          retention-days: 1

  # ============================================================
  # JOB 3 — Commit everything together once both jobs finish
  # ============================================================
  commit:
    runs-on: ubuntu-latest
    needs: [generate-html, generate-images]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download HTML pages
        uses: actions/download-artifact@v4
        with:
          name: html-pages
          path: ./explore

      - name: Download feature images
        uses: actions/download-artifact@v4
        with:
          name: feature-images
          path: ./explore/images

      - name: Commit and push all output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ./explore
          git diff --cached --quiet \
            && echo "Nothing to commit." \
            || git commit -m "chore: regenerate pages and feature images [skip ci]" && git push
