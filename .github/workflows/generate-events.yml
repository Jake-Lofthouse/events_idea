name: Generate Events

on:
  workflow_dispatch:
    inputs:
      run_html:
        description: 'Generate event HTML pages'
        required: false
        default: true
        type: boolean
      run_images:
        description: 'Generate feature images'
        required: false
        default: false
        type: boolean
      run_locations:
        description: 'Generate location pages (country/region/city) + sitemap'
        required: false
        default: true
        type: boolean
      limit:
        description: 'Max events to process (0 = all)'
        required: false
        default: '0'
        type: string
      force_regenerate_images:
        description: 'Force regenerate all images (ignore existing)'
        required: false
        default: false
        type: boolean

# On a push to main all three jobs always run.
# On workflow_dispatch the checkboxes control which jobs run.
# The commit job only downloads artifacts that were actually produced.

jobs:

  # ============================================================
  # JOB 1 — Generate event HTML pages
  # ============================================================
  generate-html:
    runs-on: ubuntu-latest
    # Run on push always; on manual dispatch only if checkbox ticked
    if: github.event_name == 'push' || github.event.inputs.run_html == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate HTML pages
        env:
          COURSE_MAPS_URL: ${{ secrets.COURSE_MAPS_URL }}
          EVENT_LIMIT: ${{ github.event.inputs.limit || '0' }}
        run: node scripts/generate-events.js

      - name: Upload HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: html-pages
          path: ./explore
          retention-days: 1

  # ============================================================
  # JOB 2 — Generate feature images
  # ============================================================
  generate-images:
    runs-on: ubuntu-latest
    # Images are slow — on push to main skip them unless force flag set.
    # On manual dispatch run only if checkbox ticked.
    if: |
      (github.event_name == 'push' && github.event.inputs.force_regenerate_images == 'true') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_images == 'true')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install canvas sharp

      - name: Install canvas system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2-dev \
            libpango1.0-dev \
            libjpeg-dev \
            libgif-dev \
            librsvg2-dev

      - name: Clear existing images (force regenerate)
        if: github.event.inputs.force_regenerate_images == 'true'
        run: |
          echo "Force regenerate enabled — clearing ./explore/images"
          rm -rf ./explore/images

      - name: Generate feature images
        env:
          COURSE_MAPS_URL: ${{ secrets.COURSE_MAPS_URL }}
          IMAGE_LIMIT: ${{ github.event.inputs.limit || '0' }}
        run: node scripts/generate-images.js

      - name: Upload images artifact
        uses: actions/upload-artifact@v4
        with:
          name: feature-images
          path: ./explore/images
          retention-days: 1

  # ============================================================
  # JOB 3 — Generate location pages + sitemap.xml
  # ============================================================
  generate-locations:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.run_locations == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate location pages and sitemap
        env:
          COURSE_MAPS_URL: ${{ secrets.COURSE_MAPS_URL }}
          EVENT_LIMIT: ${{ github.event.inputs.limit || '0' }}
        run: node scripts/generate-locations.js

      - name: Upload location pages artifact
        uses: actions/upload-artifact@v4
        with:
          name: location-pages
          path: ./locations
          retention-days: 1

      - name: Upload geo cache artifact
        uses: actions/upload-artifact@v4
        with:
          name: geo-cache
          path: ./geo-cache.json
          retention-days: 1
          if-no-files-found: ignore

  # ============================================================
  # JOB 4 — Commit all outputs
  # Waits for whichever jobs actually ran; skipped jobs are ignored.
  # ============================================================
  commit:
    runs-on: ubuntu-latest
    # Always run commit if at least one generation job ran
    if: |
      always() &&
      (needs.generate-html.result == 'success' ||
       needs.generate-images.result == 'success' ||
       needs.generate-locations.result == 'success')
    needs: [generate-html, generate-images, generate-locations]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download HTML pages
        if: needs.generate-html.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: html-pages
          path: ./explore

      - name: Download feature images
        if: needs.generate-images.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: feature-images
          path: ./explore/images

      - name: Download location pages
        if: needs.generate-locations.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: location-pages
          path: ./locations

      - name: Download geo cache
        if: needs.generate-locations.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: geo-cache
          path: .
        continue-on-error: true

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ./explore ./locations
          [ -f ./geo-cache.json ] && git add ./geo-cache.json || true
          git diff --cached --quiet \
            && echo "Nothing to commit." \
            || git commit -m "chore: regenerate site output [skip ci]" && git push
