name: Generate Events

on:
  workflow_dispatch:


jobs:

  generate-sitemap:
    runs-on: ubuntu-latest
    name: Generate Sitemap

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generate sitemap
        run: node scripts/generate-sitemap.js

      - name: Commit sitemap
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.events.xml
          git commit -m "Update sitemap" || echo "No sitemap changes"
          git pull --rebase origin main
          git push origin main

  generate-pages:
    runs-on: ubuntu-latest
    name: Generate Event Pages
    needs: generate-sitemap 

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generate event pages
        env:
          COURSE_MAPS_URL: ${{ secrets.COURSE_MAPS_URL }}
        run: node scripts/generate-events.js

      - name: Commit and push generated content
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add explore/ sitemap.events.xml
          git commit -m "Auto-update event pages" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main
