name: Generate Feature Images

on:
  # Run automatically after the main site build
  workflow_run:
    workflows: ["Generate Events"]
    types: [completed]

  # Also allow manual trigger with options
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: 'Regenerate all images (ignore existing)'
        required: false
        default: false
        type: boolean

jobs:
  generate-images:
    runs-on: ubuntu-latest
    # Only run if triggered manually, or if the upstream workflow succeeded
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install puppeteer

      - name: Install system dependencies for Puppeteer
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgbm-dev \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgtk-3-0 \
            libasound2t64 \
            libpangocairo-1.0-0 \
            libx11-xcb1

      - name: Clear existing images (force regenerate)
        if: ${{ github.event.inputs.force_regenerate == true || github.event.inputs.force_regenerate == 'true' }}
        run: |
          echo "Force regenerate enabled — clearing ./images"
          rm -rf ./images

      - name: Generate feature images
        env:
          COURSE_MAPS_URL: ${{ secrets.COURSE_MAPS_URL }}
        run: node generate-images.js

      - name: Check how many images were produced
        run: |
          COUNT=$(find ./images -name "*.jpg" | wc -l)
          echo "Total images in ./images: $COUNT"

      - name: Commit and push images
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ./images
          git diff --cached --quiet && echo "No new images to commit." || \
            git commit -m "chore: generate feature images [skip ci]" && git push
